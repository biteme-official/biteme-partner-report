name: Slack Deploy Notify

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Get merged PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const commits = ${{ toJSON(github.event.commits) }} || [];
            const prNumbers = new Set();

            for (const commit of commits) {
              const match = commit.message.match(/Merge pull request #(\d+)/) || commit.message.match(/\(#(\d+)\)/);
              if (match) prNumbers.add(match[1]);
            }

            const changes = [];
            for (const num of prNumbers) {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: parseInt(num),
                });
                changes.push({
                  number: num,
                  title: pr.title,
                  author: pr.user.login,
                });
              } catch (e) {
                changes.push({
                  number: num,
                  title: commits.find(c => c.message.includes(`#${num}`))?.message.split('\n')[0] || 'Unknown',
                  author: 'unknown',
                });
              }
            }

            if (changes.length === 0) {
              const msg = commits[0]?.message.split('\n')[0] || 'Direct push';
              changes.push({
                number: null,
                title: msg,
                author: context.actor,
              });
            }

            core.setOutput('changes', JSON.stringify(changes));
            core.setOutput('deployer', context.actor);
            core.setOutput('repo', context.repo.repo);

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          CHANGES: ${{ steps.pr.outputs.changes }}
          DEPLOYER: ${{ steps.pr.outputs.deployer }}
          REPO: ${{ steps.pr.outputs.repo }}
        run: |
          CHANGE_TEXT=$(echo "$CHANGES" | jq -r '
            map(
              if .number != null then "• #\(.number) \(.title) (@\(.author))"
              else "• \(.title) (@\(.author))"
              end
            ) | join("\n")
          ')

          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg changes "$CHANGE_TEXT" \
            --arg deployer "$DEPLOYER" \
            --arg repo_url "https://github.com/${GITHUB_REPOSITORY}" \
            '{
              attachments: [
                {
                  color: "#DC3545",
                  blocks: [
                    { type: "header", text: { type: "plain_text", text: ("🚀 Production 배포 — " + $repo) } },
                    { type: "divider" },
                    { type: "section", text: { type: "mrkdwn", text: ("*변경 내역:*\n" + $changes) } },
                    { type: "context", elements: [ { type: "mrkdwn", text: ("배포자: *@" + $deployer + "*  |  <" + $repo_url + "|GitHub>") } ] }
                  ]
                }
              ]
            }')

          RESPONSE=$(curl -s -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL")
          echo "Slack response: $RESPONSE"
          if [ "$RESPONSE" != "ok" ]; then
            echo "::error::Slack webhook rejected the payload: $RESPONSE"
            exit 1
          fi
